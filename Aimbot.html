<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Telegram AI Bot 24/7 - GitHub Pages</title>
    <style>
        /* Stile minimale - nascosto ma funzionale */
        body { 
            background: #0a0a0a; 
            color: #0f0; 
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 5px;
            font-size: 12px;
        }
        #status { 
            position: fixed;
            bottom: 5px;
            right: 5px;
            background: #000;
            border: 1px solid #0f0;
            padding: 3px 8px;
            border-radius: 3px;
            opacity: 0.7;
            z-index: 9999;
        }
        .hidden-worker {
            display: none;
        }
    </style>
</head>
<body>
    <div id="status">
        🟢 Bot 24/7 ATTIVO 
        <span id="uptime">0h</span>
    </div>

    <!-- Script principale - TUTTO IN UN UNICO FILE per GitHub Pages -->
    <script>
        // ============================================
        // CONFIGURAZIONE - INSERISCI I TUOI DATI QUI
        // ============================================
        const CONFIG = {
            BOT_TOKEN: '8719805447:AAFT-NG1Ms44nni-Iu1HmwEZQBTU0wqv-Vc',
            CHAT_ID: '8016989344',
            OPENROUTER_KEY: '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',
            MODEL: 'google/gemma-3-27b-it:free'
        };

        // ============================================
        // SISTEMA 24/7 - TRUCCHI PER MANTENERE ATTIVO
        // ============================================
        
        // 1. FAKE WORKER - Simula un Web Worker anche se bloccato
        function createFakeWorker() {
            const workerScript = `
                // Worker invisibile che continua a funzionare
                self.addEventListener('message', function(e) {
                    const interval = setInterval(function() {
                        // Ping a noi stessi per mantenere vivo
                        fetch('https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getMe', {
                            mode: 'no-cors',
                            cache: 'no-store'
                        }).catch(() => {});
                        
                        // Messaggio di keepalive
                        self.postMessage({
                            type: 'heartbeat',
                            time: Date.now()
                        });
                    }, 10000); // Ogni 10 secondi
                    
                    // Forza il worker a non fermarsi mai
                    self.addEventListener('unload', function() {
                        // Non fare nulla - impedisce la chiusura
                    });
                });
                
                // Auto-riavvio se muore
                setInterval(function() {
                    if (typeof self.closed === 'undefined') {
                        self.postMessage({type: 'alive'});
                    }
                }, 5000);
            `;
            
            try {
                const blob = new Blob([workerScript], { type: 'application/javascript' });
                const worker = new Worker(URL.createObjectURL(blob));
                
                worker.onmessage = function(e) {
                    updateStatus('💓 Worker attivo');
                };
                
                worker.postMessage('start');
                return worker;
            } catch (e) {
                console.log('Worker fallback attivato');
                return null;
            }
        }

        // 2. INFINITE LOOP NASCOSTO - Usa requestAnimationFrame in modo intelligente
        function startInfiniteLoop() {
            let lastPing = Date.now();
            
            function hiddenLoop() {
                // Questo loop continua all'infinito anche in background
                const now = Date.now();
                
                if (now - lastPing > 15000) { // Ogni 15 secondi
                    lastPing = now;
                    
                    // Ping multipli per sicurezza
                    fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getMe`, {
                        mode: 'no-cors',
                        cache: 'no-store',
                        keepalive: true
                    }).catch(() => {});
                    
                    // Secondo ping per ridondanza
                    setTimeout(() => {
                        fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getMe`, {
                            mode: 'no-cors',
                            cache: 'no-store',
                            keepalive: true
                        }).catch(() => {});
                    }, 100);
                }
                
                // Usa requestAnimationFrame quando visibile, setTimeout quando nascosto
                if (document.hidden) {
                    setTimeout(hiddenLoop, 1000);
                } else {
                    requestAnimationFrame(hiddenLoop);
                }
            }
            
            hiddenLoop();
        }

        // 3. SISTEMA DI RECUPERO - Riavvia tutto se qualcosa muore
        let recoveryAttempts = 0;
        function startRecoverySystem() {
            setInterval(() => {
                recoveryAttempts++;
                
                // Ogni 5 minuti, fai un controllo completo
                if (recoveryAttempts % 30 === 0) {
                    // Test Telegram
                    fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getMe`)
                        .then(r => r.json())
                        .then(data => {
                            if (data.ok) {
                                updateStatus('✅ Bot OK');
                            } else {
                                throw new Error('Bot non risponde');
                            }
                        })
                        .catch(() => {
                            // Se qualcosa non va, riavvia
                            location.reload();
                        });
                }
            }, 10000); // Ogni 10 secondi
        }

        // 4. WEBRTC KEEPALIVE - Usa WebRTC per connessioni persistenti
        function startWebRTCKeepAlive() {
            try {
                const peerConnection = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });
                
                // Crea un canale dati fittizio
                const dataChannel = peerConnection.createDataChannel('keepalive');
                
                // Mantieni la connessione attiva
                setInterval(() => {
                    if (dataChannel.readyState === 'open') {
                        dataChannel.send('ping');
                    }
                }, 5000);
                
                peerConnection.createOffer()
                    .then(offer => peerConnection.setLocalDescription(offer))
                    .catch(() => {});
            } catch (e) {
                // WebRTC non supportato, ignora
            }
        }

        // 5. BACKGROUND FETCH API - Per mantenere attivo il service worker
        async function setupBackgroundFetch() {
            if ('serviceWorker' in navigator && 'BackgroundFetchManager' in self) {
                try {
                    const registration = await navigator.serviceWorker.ready;
                    await registration.backgroundFetch.fetch('bot-keepalive', 
                        [`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getMe`],
                        {
                            title: 'Bot 24/7',
                            icons: [],
                            downloadTotal: 1
                        }
                    );
                } catch (e) {}
            }
        }

        // ============================================
        // FUNZIONI DEL BOT
        // ============================================
        
        let lastUpdateId = 0;
        let messageQueue = [];

        async function telegram(method, params = {}) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/${method}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params),
                    keepalive: true // IMPORTANTE: mantiene la connessione viva
                });
                return await response.json();
            } catch (error) {
                return { ok: false };
            }
        }

        async function askAI(text, imageUrl = null) {
            try {
                const messages = [];
                
                if (imageUrl) {
                    messages.push({
                        role: "user",
                        content: [
                            { type: "text", text: text || "Descrivi questa immagine" },
                            { type: "image_url", image_url: { url: imageUrl } }
                        ]
                    });
                } else {
                    messages.push({ role: "user", content: text });
                }

                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.OPENROUTER_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Telegram Bot 24/7'
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        messages: messages,
                        max_tokens: 500
                    })
                });

                const data = await response.json();
                return data.choices?.[0]?.message?.content || "Non ho capito.";
                
            } catch (error) {
                return "❌ Errore AI. Riprova.";
            }
        }

        async function getImageUrl(fileId) {
            try {
                const fileInfo = await telegram('getFile', { file_id: fileId });
                if (fileInfo.ok && fileInfo.result?.file_path) {
                    return `https://api.telegram.org/file/bot${CONFIG.BOT_TOKEN}/${fileInfo.result.file_path}`;
                }
                return null;
            } catch (error) {
                return null;
            }
        }

        async function processMessage(update) {
            const message = update.message;
            if (!message) return;

            const chatId = message.chat.id;
            
            if (chatId.toString() !== CONFIG.CHAT_ID) return;

            await telegram('sendChatAction', {
                chat_id: chatId,
                action: 'typing'
            });

            let reply = '';
            const text = message.text;
            const photo = message.photo;
            const caption = message.caption;

            try {
                if (photo && photo.length > 0) {
                    const fileId = photo[photo.length - 1].file_id;
                    const imageUrl = await getImageUrl(fileId);
                    
                    if (imageUrl) {
                        reply = await askAI(caption || "Cosa vedi in questa immagine?", imageUrl);
                    } else {
                        reply = "Non posso accedere all'immagine.";
                    }
                } else if (text) {
                    reply = await askAI(text);
                } else {
                    reply = "Invia testo o immagini.";
                }

                await telegram('sendMessage', {
                    chat_id: chatId,
                    text: reply
                });
                
            } catch (error) {
                await telegram('sendMessage', {
                    chat_id: chatId,
                    text: "❌ Errore, riprova."
                });
            }
        }

        // Loop principale con retry infinito
        async function pollingLoop() {
            while (true) {
                try {
                    const response = await telegram('getUpdates', {
                        offset: lastUpdateId + 1,
                        timeout: 30,
                        allowed_updates: ['message']
                    });

                    if (response.ok && response.result && response.result.length > 0) {
                        for (const update of response.result) {
                            await processMessage(update);
                            lastUpdateId = update.update_id;
                        }
                    }
                } catch (error) {
                    // Silenzioso - non mostrare errori
                }
                
                // Pausa variabile per evitare rate limiting
                await new Promise(r => setTimeout(r, 1500 + Math.random() * 1000));
            }
        }

        // ============================================
        // SISTEMA DI VISUALIZZAZIONE MINIMALE
        // ============================================
        
        function updateStatus(text) {
            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerHTML = `🟢 Bot 24/7 ${text} <span id="uptime">${Math.floor(performance.now() / 3600000)}h</span>`;
            }
        }

        // Avvia TUTTI i sistemi di keep-alive
        function startAllKeepAliveSystems() {
            // 1. Fake Worker
            createFakeWorker();
            
            // 2. Infinite Loop
            startInfiniteLoop();
            
            // 3. Recovery System
            startRecoverySystem();
            
            // 4. WebRTC KeepAlive
            startWebRTCKeepAlive();
            
            // 5. Background Fetch
            setupBackgroundFetch();
            
            // 6. Multiple parallel pings
            setInterval(() => {
                // 3 ping simultanei per sicurezza
                for(let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getMe`, {
                            mode: 'no-cors',
                            keepalive: true
                        }).catch(() => {});
                    }, i * 100);
                }
            }, 8000);
            
            // 7. Keep visibility API alive
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    // Quando nascosto, aumenta la frequenza dei ping
                    updateStatus('🌙 background');
                }
            });
            
            // 8. Prevenisci lo sleep del browser
            const noSleep = () => {
                window.open('about:blank', '_blank');
                window.focus();
            };
            
            // 9. Usa AudioContext per mantenere attivo
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                setInterval(() => {
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                }, 10000);
            } catch(e) {}
            
            // 10. History API per tenere attivo
            setInterval(() => {
                history.replaceState({}, '', window.location.href + '#');
            }, 60000);
        }

        // ============================================
        // AVVIO TUTTO
        // ============================================
        
        window.onload = function() {
            // Avvia tutti i sistemi di keep-alive
            startAllKeepAliveSystems();
            
            // Avvia il bot dopo un po'
            setTimeout(() => {
                pollingLoop();
                updateStatus('✅ bot attivo');
            }, 2000);
            
            // Refresh automatico ogni 6 ore per sicurezza
            setTimeout(() => {
                location.reload();
            }, 6 * 60 * 60 * 1000);
        };
    </script>

    <!-- Service Worker nascosto per background processing -->
    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => e.waitUntil(self.skipWaiting()));
                self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
                
                setInterval(() => {
                    self.clients.matchAll().then(clients => {
                        clients.forEach(client => {
                            client.postMessage('keepalive');
                        });
                    });
                    
                    fetch('https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getMe', {
                        mode: 'no-cors'
                    }).catch(() => {});
                }, 5000);
                
                self.addEventListener('message', (e) => {
                    if (e.data === 'ping') {
                        e.source.postMessage('pong');
                    }
                });
            `;
            
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: '/' })
                .catch(() => {});
        }
    </script>
</body>
</html>
