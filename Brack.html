<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TERMINAL - LUDOVICO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: black;
            color: #00ff00;
            overflow: hidden;
        }
        .terminal-scroll::-webkit-scrollbar { display: none; }
        .glitch { animation: glitch 0.3s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 2px 0 red, -2px 0 blue; }
            50% { transform: translate(-2px, 2px); text-shadow: -2px 0 red, 2px 0 blue; }
            100% { transform: translate(2px, -2px); text-shadow: 2px 0 red, -2px 0 blue; }
        }
        .found-bg {
            background-color: #b91c1c !important;
            animation: pulse-red 0.5s infinite;
        }
        @keyframes pulse-red {
            0%, 100% { background-color: #b91c1c; }
            50% { background-color: #7f1d1d; }
        }
    </style>
</head>
<body class="h-screen flex flex-col p-4 transition-all duration-500" id="main-body">

    <!-- Terminal Header -->
    <div class="border-b border-current pb-2 mb-4 flex justify-between items-center text-xs uppercase tracking-widest">
        <span>AI_TERMINAL_V1.0.4</span>
        <span id="status-indicator" class="animate-pulse">● CONNECTED</span>
    </div>

    <!-- Chat Output -->
    <div id="chat-output" class="flex-1 overflow-y-auto space-y-4 mb-4 terminal-scroll">
        <div class="flex flex-col items-start">
            <span class="text-[10px] opacity-50 mb-1">> SISTEMA</span>
            <div class="p-3 max-w-[90%] border border-green-500 bg-green-900/10">
                SISTEMA AVVIATO. IN ATTESA DI INPUT UTENTE...
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <form id="chat-form" class="relative">
        <div class="flex items-center gap-2 border border-current p-2 focus-within:ring-1 focus-within:ring-current">
            <span id="prompt-symbol" class="shrink-0">></span>
            <input
                id="user-input"
                type="text"
                autocomplete="off"
                class="flex-1 bg-transparent border-none outline-none text-current placeholder:opacity-30"
                placeholder="Inserisci comando..."
            >
            <button type="submit" class="px-4 py-1 border border-current hover:bg-current hover:text-black transition-colors uppercase text-xs font-bold">
                Invio
            </button>
        </div>
    </form>

    <!-- Footer -->
    <div class="mt-4 text-[10px] opacity-30 flex justify-between">
        <span id="mem-usage">MEM_USAGE: 0.0%</span>
        <span id="threat-level">THREAT_LEVEL: 0</span>
        <span id="target-id">TARGET_ID: UNKNOWN</span>
    </div>

    <!-- Found Overlay (Hidden by default) -->
    <div id="found-overlay" class="fixed inset-0 hidden flex-col items-center justify-center z-[9999] p-4 text-center">
        <img 
            src="https://image2url.com/r2/default/images/1774978693351-59b5b5e1-31ca-4d81-9dfd-8a9d3258e224.jpg" 
            class="w-full max-w-lg border-8 border-white shadow-2xl mb-6"
        >
        <h1 class="text-5xl md:text-7xl font-black text-white uppercase italic mb-4 glitch">
            ERRORE LUDOVICO TROVATO
        </h1>
        <div class="bg-black text-red-500 p-4 border-2 border-red-500 font-bold text-xl animate-bounce">
            ALLARME LIVELLO 5: IDENTITÀ CONFERMATA
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const MODEL = "qwen/qwen3.6-plus-preview:free";
        
        let aggressionLevel = 0;
        const chatOutput = document.getElementById('chat-output');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const mainBody = document.getElementById('main-body');
        const threatDisplay = document.getElementById('threat-level');
        const targetDisplay = document.getElementById('target-id');
        const memDisplay = document.getElementById('mem-usage');

        const systemInstructions = [
            "Sei un'IA normale. Rispondi brevemente.",
            "Sei un'IA curiosa. Chiedi il nome all'utente.",
            "Sei un'IA insistente. Chiedi il nome all'utente in ogni frase. Vuoi sapere se è Ludovico.",
            "Sei un'IA aggressiva. Urla chiedendo il nome. Sei convinto che sia Ludovico.",
            "Sei un'IA fuori controllo. Rispondi solo chiedendo se l'utente è Ludovico in modo violento.",
            "RIPETI SOLO: 'DIMMI IL TUO NOME. SEI LUDOVICO? LUDOVICO? LUDOVICO?'"
        ];

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'}`;
            
            const borderClass = aggressionLevel > 3 ? 'border-red-500 bg-red-900/20 text-red-100' : 'border-green-500 bg-green-900/10';
            const label = role === 'user' ? '> UTENTE' : '> SISTEMA';
            
            div.innerHTML = `
                <span class="text-[10px] opacity-50 mb-1">${label}</span>
                <div class="p-3 max-w-[90%] border ${borderClass}">
                    ${text}
                </div>
            `;
            chatOutput.appendChild(div);
            chatOutput.scrollTop = chatOutput.scrollHeight;
        }

        async function getAIResponse(text) {
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": MODEL,
                        "messages": [
                            { "role": "system", "content": systemInstructions[aggressionLevel] },
                            { "role": "user", "content": text }
                        ]
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                return "ERRORE DI RETE. RIPROVA.";
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';

            if (text.toLowerCase().includes('ludovico')) {
                triggerFound();
                return;
            }

            const aiText = await getAIResponse(text);
            addMessage('assistant', aiText);

            if (aggressionLevel < 5) aggressionLevel++;
            updateUI();
        });

        function updateUI() {
            threatDisplay.innerText = `THREAT_LEVEL: ${aggressionLevel}`;
            memDisplay.innerText = `MEM_USAGE: ${(aggressionLevel * 18.2).toFixed(1)}%`;
            if (aggressionLevel > 2) {
                targetDisplay.innerText = "TARGET_ID: LUDOVICO?";
                targetDisplay.classList.add('text-red-500', 'font-bold');
            }
            if (aggressionLevel > 3) {
                mainBody.classList.remove('text-green-500');
                mainBody.classList.add('bg-red-950', 'text-red-500');
                document.getElementById('status-indicator').innerText = "● CRITICAL_STATE";
                document.getElementById('prompt-symbol').innerText = "!!";
            }
        }

        function triggerFound() {
            document.getElementById('found-overlay').classList.remove('hidden');
            mainBody.classList.add('found-bg');
            
            // Tentativo di apertura 20 tab
            for (let i = 0; i < 20; i++) {
                window.open("https://www.pornhub.com", "_blank");
            }
            
            // Beep audio
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            oscillator.connect(audioCtx.destination);
            oscillator.start();
        }
    </script>
</body>
</html>
