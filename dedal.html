            resultArea.style.display = 'block';
            resultArea.innerHTML = `<div class="result-line error">[-] No matches found for "${name}"</div>`;
            addLine(`[-] No matches found`, 'error');
        }
    }

    // Event listener per ricerca (Enter)
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (!query) return;

            // Pulisci risultati precedenti
            resultArea.style.display = 'none';
            
            // Ferma simulazioni precedenti
            if (simulationInterval) {
                clearInterval(simulationInterval);
            }

            // Determina se è un ID/username o una ricerca per nome
            const hasNumbers = /\d{5,6}/.test(query);
            
            if (hasNumbers) {
                // È un ID o username - fai simulazione completa
                startHackingSimulation(query);
            } else {
                // Ricerca per nome - simulazione più breve
                clearConsole();
                addLine(`[*] Searching database for: "${query}"`);
                addLine('[*] Scanning email fields...');
                setTimeout(() => {
                    searchByName(query);
                }, 500);
            }
        }
    });

    // Welcome message
    addLine('[+] System ready. Enter target (dedaloroma + ID or name)');
    addLine('[+] Example: dedaloroma130776 or 130777 or "daniela"');
</script>
</body>
</html>
