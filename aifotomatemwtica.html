<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision · analisi immagini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 300;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .container {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* header minimalissimo */
        header {
            border-bottom: 1px solid #333;
            padding-bottom: 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: -0.02em;
        }

        .mono {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #888;
        }

        /* area carica immagini */
        .upload-panel {
            border: 1px solid #222;
            background: #0a0a0a;
            padding: 1.8rem 1.5rem;
            margin-bottom: 2rem;
        }

        .upload-label {
            display: block;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        .drop-zone {
            border: 1px dashed #444;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: border 0.15s, background 0.15s;
            background: #050505;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: #fff;
            background: #111;
        }

        .drop-zone p {
            color: #aaa;
            font-size: 0.95rem;
        }

        .image-preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .preview-item {
            position: relative;
            width: 90px;
            height: 90px;
            border: 1px solid #333;
            background: #000;
            overflow: hidden;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .remove-image {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #555;
            color: #fff;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: monospace;
        }

        .remove-image:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* prompt area */
        .prompt-box {
            margin: 1.5rem 0 1.8rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 0.6rem;
        }

        textarea {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 1rem;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            min-height: 90px;
            font-weight: 300;
        }

        textarea:focus {
            outline: none;
            border-color: #fff;
        }

        /* pulsanti */
        .actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            border-top: 1px solid #222;
            padding-top: 1.8rem;
            margin-bottom: 2rem;
        }

        button {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 0.8rem 2rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.1s ease;
            font-weight: 300;
        }

        button:hover {
            background: #fff;
            color: #000;
        }

        button:disabled {
            opacity: 0.2;
            border-color: #666;
            pointer-events: none;
        }

        .api-key-hint {
            font-size: 0.75rem;
            color: #666;
            margin-left: auto;
        }

        /* risultato */
        .result {
            border-top: 1px solid #333;
            padding: 1.5rem 0 2rem;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .result-header span {
            color: #888;
            font-size: 0.8rem;
            font-family: monospace;
        }

        pre {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 1.2rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #ccc;
            margin-bottom: 1rem;
        }

        .status {
            color: #aaa;
            font-style: italic;
        }

        .error {
            color: #ff4f4f;
            border-left: 3px solid #ff4f4f;
            padding-left: 1rem;
        }

        footer {
            border-top: 1px solid #222;
            margin-top: 2rem;
            padding: 1rem 0;
            font-size: 0.7rem;
            color: #555;
            text-align: right;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>vision ⚫⚪</h1>
        <div class="mono">multimodal · auto</div>
    </header>

    <!-- upload immagini -->
    <div class="upload-panel">
        <span class="upload-label">⫸ immagini (una o più)</span>
        <div class="drop-zone" id="dropZone">
            <p>+ clicca o trascina immagini qui</p>
            <p style="font-size:0.75rem; margin-top:0.5rem; color:#555">jpg · png · webp · max 10</p>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">

        <!-- anteprime -->
        <div class="image-preview-grid" id="previewContainer"></div>
    </div>

    <!-- prompt -->
    <div class="prompt-box">
        <label for="prompt">➤ prompt / domanda</label>
        <textarea id="prompt" placeholder="es: Descrivi cosa vedi in queste immagini, confrontale, riassumi...">Cosa mostrano queste immagini? Descrivi in modo dettagliato.</textarea>
    </div>

    <!-- azioni e chiave -->
    <div class="actions">
        <button id="submitBtn" class="mono">invia richiesta</button>
        <div class="api-key-hint">
            <span style="color:#444">🔑 key: </span><span style="font-family:mono">sk-or‑v1·3027ab…</span>
        </div>
    </div>

    <!-- output risultato -->
    <div class="result">
        <div class="result-header">
            <span>𖦹 risposta</span>
            <span id="callStatus" class="status">⏚ attesa</span>
        </div>
        <pre id="responseOutput">—</pre>
    </div>

    <footer>
        minimal black/white · openrouter vision
    </footer>
</div>

<script>
    (function() {
        // DOM
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const promptText = document.getElementById('prompt');
        const submitBtn = document.getElementById('submitBtn');
        const responseOutput = document.getElementById('responseOutput');
        const callStatus = document.getElementById('callStatus');

        // API key fissa (dal tuo comando curl)
        const API_KEY = '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';

        // store immagini (come DataURL e file oggetto)
        let imageFiles = [];

        // Aggiorna anteprime
        function renderPreviews() {
            previewContainer.innerHTML = '';
            if (imageFiles.length === 0) {
                // nessuna immagine
                return;
            }

            imageFiles.forEach((imgData, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const item = document.createElement('div');
                    item.className = 'preview-item';

                    const img = document.createElement('img');
                    img.src = e.target.result;

                    const removeBtn = document.createElement('span');
                    removeBtn.className = 'remove-image';
                    removeBtn.textContent = '✕';
                    removeBtn.setAttribute('data-index', index);

                    removeBtn.addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        const idx = parseInt(removeBtn.getAttribute('data-index'), 10);
                        imageFiles.splice(idx, 1);
                        renderPreviews(); // ricarica tutto
                    });

                    item.appendChild(img);
                    item.appendChild(removeBtn);
                    previewContainer.appendChild(item);
                };
                reader.readAsDataURL(imgData.file);
            });
        }

        // Gestione drag & drop
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            addFiles(files);
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            addFiles(files);
            fileInput.value = ''; // reset per permettere ricarica stesso file
        });

        function addFiles(files) {
            if (imageFiles.length + files.length > 10) {
                alert('massimo 10 immagini');
                return;
            }

            files.forEach(file => {
                // memorizza oggetto con file e id provvisorio
                imageFiles.push({
                    id: 'img-' + Date.now() + '-' + Math.random(),
                    file: file
                });
            });
            renderPreviews();
        }

        // invio richiesta
        submitBtn.addEventListener('click', async () => {
            const prompt = promptText.value.trim() || "Cosa contiene questa immagine?";
            if (imageFiles.length === 0) {
                alert('Aggiungi almeno un\'immagine');
                return;
            }

            // disabilita pulsante durante richiesta
            submitBtn.disabled = true;
            callStatus.textContent = '⏳ elaborazione...';
            responseOutput.textContent = 'attendere, chiamata API in corso...';

            try {
                // Costruisce i messaggi: primo messaggio user con testo + tutte le immagini
                const contentParts = [];

                // 1) parte di testo (prompt)
                contentParts.push({
                    type: "text",
                    text: prompt
                });

                // 2) per ogni immagine, costruisci image_url con data base64
                for (let img of imageFiles) {
                    const base64 = await fileToBase64(img.file);
                    // ottieni il mime corretto
                    const mime = img.file.type || 'image/jpeg';
                    const dataUrl = `data:${mime};base64,${base64}`;

                    contentParts.push({
                        type: "image_url",
                        image_url: {
                            url: dataUrl
                        }
                    });
                }

                // corpo richiesta identico al curl tranne messages
                const requestBody = {
                    model: "openrouter/auto",
                    messages: [
                        {
                            role: "user",
                            content: contentParts
                        }
                    ]
                };

                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`,
                        'HTTP-Referer': window.location.origin, // utile per openrouter
                        'X-Title': 'Vision-minimal'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText.substring(0,200)}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || 'Nessuna risposta.';
                responseOutput.textContent = reply;
                callStatus.textContent = '✔ completato';

            } catch (err) {
                console.error(err);
                responseOutput.textContent = `ERRORE: ${err.message}`;
                callStatus.textContent = '✖ fallito';
            } finally {
                submitBtn.disabled = false;
            }
        });

        // utility: file -> base64 (senza prefisso)
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const result = reader.result; // data:image/png;base64,AAAA...
                    const base64 = result.split(',')[1]; // prendi solo dopo virgola
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Inizializza anteprime (vuote)
        renderPreviews();
    })();
</script>
</body>
</html>
