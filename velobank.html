<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELO · movimenti completi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f4f6fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .app {
            width: 100%;
            max-width: 540px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .screen {
            padding: 2rem 1.8rem;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 500;
            color: #111;
            margin-bottom: 2rem;
        }

        h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1f2937;
        }

        .label-small {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7280;
            margin-bottom: 0.25rem;
        }

        .card-minimal {
            background: #f9fafc;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #edf0f5;
            margin: 1.5rem 0;
        }

        .wallet-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            padding: 1.2rem 1.5rem;
            border-radius: 100px;
            border: 1px solid #eef2f6;
            margin-bottom: 1.8rem;
        }

        .wallet-number {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 500;
            color: #1f2937;
            background: #f3f4f6;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }

        .balance {
            font-size: 2rem;
            font-weight: 550;
            color: #0b1622;
        }

        .balance small {
            font-size: 1rem;
            font-weight: 400;
            color: #9ca3af;
            margin-left: 0.2rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            background: #f3f4f6;
            padding: 0.4rem;
            border-radius: 40px;
            margin: 1.8rem 0 1.5rem;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.8rem 0.2rem;
            border-radius: 40px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            font-size: 0.9rem;
            min-width: 70px;
            transition: 0.2s;
        }

        .tab.active {
            background: white;
            color: #111;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: white;
            border: 1.5px solid #e5e9f0;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        button {
            width: 100%;
            padding: 1rem 1.5rem;
            background: #111;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        button.secondary {
            background: white;
            color: #111;
            border: 1.5px solid #e5e9f0;
        }

        button.secondary:hover {
            background: #f8fafd;
        }

        button.danger {
            background: #dc2626;
        }

        button.danger:hover {
            background: #b91c1c;
        }

        .badge-admin {
            background: #fbbf24;
            color: #111;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 100px;
            margin-left: 0.8rem;
        }

        .code-box {
            background: #f3f4f6;
            border-radius: 40px;
            padding: 1rem;
            font-family: monospace;
            font-size: 1.4rem;
            text-align: center;
            border: 1px dashed #9ca3af;
            color: #1f2937;
            margin: 1rem 0;
        }

        .message {
            font-size: 0.9rem;
            padding: 0.5rem 0;
            min-height: 2rem;
            color: #6b7280;
            text-align: center;
        }

        .message.success {
            color: #059669;
        }

        .message.error {
            color: #dc2626;
        }

        .hidden {
            display: none;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #e5e9f0;
            color: #4b5563;
            padding: 0.5rem 1.2rem;
            width: auto;
            margin: 0;
        }

        .flex-right {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        /* Liste */
        .transactions-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 1rem;
            padding-right: 0.3rem;
        }

        .transaction-item {
            background: white;
            border: 1px solid #edf0f5;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            transition: 0.2s;
        }

        .transaction-item:hover {
            border-color: #2563eb;
            box-shadow: 0 2px 8px rgba(37,99,235,0.1);
        }

        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .transaction-type {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .type-icon {
            width: 32px;
            height: 32px;
            background: #f3f4f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .type-text {
            font-weight: 600;
            color: #1f2937;
        }

        .transaction-amount {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .amount-positive {
            color: #059669;
        }

        .amount-negative {
            color: #dc2626;
        }

        .transaction-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #6b7280;
            margin-left: 2.5rem;
        }

        .transaction-user {
            background: #f3f4f6;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 500;
        }

        .transaction-time {
            font-family: monospace;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 0;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        /* Admin stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border: 1px solid #edf0f5;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 600;
            color: #111;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 0.3rem;
        }

        .filter-select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid #e5e9f0;
            border-radius: 40px;
            margin-bottom: 1rem;
            background: white;
        }

        .admin-only {
            border-left: 4px solid #fbbf24;
        }

        .user-badge {
            font-size: 0.7rem;
            background: #e5e9f0;
            padding: 0.2rem 0.5rem;
            border-radius: 40px;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- AUTH SCREEN -->
        <div id="authScreen" class="screen">
            <h2>accedi a <span style="font-weight:600;">VELO</span></h2>
            <div id="authMessage" class="message hidden"></div>

            <div class="input-group">
                <div class="label-small">username</div>
                <input type="text" id="loginUsername" placeholder="es. mario" autocomplete="off">
            </div>
            <div class="input-group">
                <div class="label-small">password</div>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>

            <button id="loginBtn">accedi</button>
            <button class="secondary" id="signupBtn" style="margin-top:0.8rem;">crea account (bonus 1 VELO)</button>
        </div>

        <!-- DASHBOARD SCREEN -->
        <div id="dashboardScreen" class="screen hidden">
            <div class="flex-right">
                <button class="logout-btn" id="logoutBtn">esci</button>
            </div>

            <div class="wallet-section">
                <span class="wallet-number" id="walletDisplay">••••••</span>
                <span class="balance" id="balanceDisplay">0 <small>VELO</small></span>
            </div>

            <div id="adminBadgeContainer" class="hidden" style="text-align:center; margin-bottom:0.8rem;">
                <span class="badge-admin">👑 amministratore · vede tutti i movimenti</span>
            </div>

            <div class="tabs" id="tabsContainer">
                <div class="tab active" id="tabInvia">invia</div>
                <div class="tab" id="tabRicevi">ricevi</div>
                <div class="tab" id="tabMovimenti">movimenti</div>
                <div class="tab hidden" id="tabAdmin">admin</div>
            </div>

            <!-- Panel invia -->
            <div id="panelInvia">
                <div class="card-minimal">
                    <div class="label-small">invia VELO a</div>
                    <div class="input-group">
                        <input type="text" id="destWallet" maxlength="6" placeholder="wallet 6 cifre">
                    </div>
                    <div class="label-small">quantità</div>
                    <div class="input-group">
                        <input type="number" id="sendAmount" min="1" value="1">
                    </div>
                    <button id="sendVeloBtn">invia</button>
                    <div id="sendMessage" class="message"></div>
                </div>
            </div>

            <!-- Panel ricevi -->
            <div id="panelRicevi" class="hidden">
                <div class="card-minimal" style="text-align:center;">
                    <div class="label-small">il tuo wallet</div>
                    <div class="code-box" id="ownWalletDisplay">000000</div>
                    <p class="message" style="margin-top:1rem;">condividi per ricevere pagamenti</p>
                </div>
            </div>

            <!-- Panel MOVIMENTI (cambia in base a chi guarda) -->
            <div id="panelMovimenti" class="hidden">
                <div class="card-minimal">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <span class="label-small" id="movementsTitle">i tuoi movimenti</span>
                        <span class="label-small" id="transactionsCount">0</span>
                    </div>
                    
                    <!-- Filtri per admin -->
                    <div id="adminFilters" class="hidden">
                        <select id="userFilter" class="filter-select">
                            <option value="all">tutti gli utenti</option>
                        </select>
                        <select id="typeFilter" class="filter-select">
                            <option value="all">tutti i tipi</option>
                            <option value="invia">solo invii</option>
                            <option value="ricevi">solo ricevute</option>
                            <option value="ricarica">solo ricariche</option>
                        </select>
                    </div>

                    <!-- Lista movimenti -->
                    <div id="transactionsList" class="transactions-list"></div>
                </div>
            </div>

            <!-- Panel ADMIN (gestione utenti) -->
            <div id="panelAdmin" class="hidden">
                <div class="card-minimal admin-only">
                    <h3>👥 gestione utenti</h3>
                    
                    <!-- Statistiche -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="totalUsers">0</div>
                            <div class="stat-label">utenti</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="totalVelo">0</div>
                            <div class="stat-label">VELO totali</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="totalTransactions">0</div>
                            <div class="stat-label">transazioni</div>
                        </div>
                    </div>

                    <!-- Lista utenti -->
                    <div class="label-small">tutti gli utenti</div>
                    <div id="usersListContainer" class="transactions-list" style="max-height: 300px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const API_URL = 'https://67cb65973395520e6af537e3.mockapi.io/api/v3/Cookie';
            
            let currentUser = null;
            let usersCache = [];
            let autoUpdateInterval = null;
            
            // Storage per transazioni
            let transactionsStorage = [];

            // Cookie helpers
            function setCookie(username, maxAgeDays = 7) {
                let d = new Date();
                d.setTime(d.getTime() + (maxAgeDays * 24 * 60 * 60 * 1000));
                document.cookie = `veloUser=${encodeURIComponent(username)}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
            }

            function getCookie() {
                let name = "veloUser=";
                let decodedCookie = decodeURIComponent(document.cookie);
                let ca = decodedCookie.split(';');
                for(let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) == ' ') c = c.substring(1);
                    if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
                }
                return "";
            }

            function deleteCookie() {
                document.cookie = "veloUser=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            }

            // API calls
            async function apiGet() {
                try {
                    let resp = await fetch(API_URL);
                    return await resp.json();
                } catch (e) {
                    return [];
                }
            }

            async function apiPost(userData) {
                try {
                    let resp = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                    return await resp.json();
                } catch (e) {
                    return null;
                }
            }

            async function apiPut(id, userData) {
                try {
                    let resp = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                    return await resp.json();
                } catch (e) {
                    return null;
                }
            }

            async function apiDelete(id) {
                try {
                    let resp = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });
                    return resp.ok;
                } catch (e) {
                    return false;
                }
            }

            // Genera wallet univoco
            function generateUniqueWallet(users) {
                let existingWallets = new Set(users.map(u => u.wallet).filter(Boolean));
                let wallet;
                do {
                    wallet = String(Math.floor(100000 + Math.random() * 900000));
                } while (existingWallets.has(wallet));
                return wallet;
            }

            // Aggiungi transazione
            function addTransaction(type, amount, otherWallet, description = '', userId = null) {
                const targetUserId = userId || (currentUser ? currentUser.id : null);
                if (!targetUserId) return;
                
                const user = usersCache.find(u => u.id === targetUserId);
                
                const transaction = {
                    id: Date.now() + Math.random(),
                    type: type,
                    amount: amount,
                    otherWallet: otherWallet,
                    timestamp: new Date().toISOString(),
                    description: description,
                    userId: targetUserId,
                    userName: user?.username || 'unknown',
                    userWallet: user?.wallet || '------'
                };
                
                transactionsStorage.push(transaction);
                
                // Mantieni ultime 500 transazioni
                if (transactionsStorage.length > 500) {
                    transactionsStorage = transactionsStorage
                        .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp))
                        .slice(-500);
                }
                
                saveTransactions();
                
                // Aggiorna UI se necessario
                if (!document.getElementById('panelMovimenti').classList.contains('hidden')) {
                    renderTransactions();
                }
            }

            function saveTransactions() {
                localStorage.setItem('velo_transactions', JSON.stringify(transactionsStorage));
            }

            // Carica transazioni
            function loadTransactions() {
                const saved = localStorage.getItem('velo_transactions');
                if (saved) {
                    try {
                        transactionsStorage = JSON.parse(saved);
                    } catch (e) {
                        transactionsStorage = [];
                    }
                }
            }

            // Crea admin se non esiste
            async function ensureAdminAccount() {
                usersCache = await apiGet();
                if (!Array.isArray(usersCache)) usersCache = [];

                let admin = usersCache.find(u => u.username === 'admin');
                if (!admin) {
                    let adminWallet = generateUniqueWallet(usersCache);
                    let adminUser = {
                        username: 'admin',
                        password: 'admin',
                        wallet: adminWallet,
                        velo: 100000
                    };
                    let created = await apiPost(adminUser);
                    if (created) {
                        usersCache.push(created);
                    }
                }
            }

            // UI functions
            function showAuth() {
                stopAutoUpdate();
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('dashboardScreen').classList.add('hidden');
            }

            function showDashboard() {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
                updateDashboardUI();
                startAutoUpdate();
                activateTab('invia');
            }

            function updateDashboardUI() {
                if (!currentUser) return;
                document.getElementById('walletDisplay').innerText = currentUser.wallet || '------';
                document.getElementById('balanceDisplay').innerHTML = `${currentUser.velo} <small>VELO</small>`;
                document.getElementById('ownWalletDisplay').innerText = currentUser.wallet || '000000';

                const isAdmin = (currentUser.username === 'admin');
                document.getElementById('adminBadgeContainer').className = isAdmin ? '' : 'hidden';
                document.getElementById('tabAdmin').className = isAdmin ? 'tab' : 'tab hidden';
                
                if (isAdmin) {
                    renderUsersList();
                    populateUserFilter();
                }
            }

            function activateTab(tabId) {
                const tabs = ['invia', 'ricevi', 'movimenti', 'admin'];
                tabs.forEach(t => {
                    document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`).classList.remove('active');
                    document.getElementById(`panel${t.charAt(0).toUpperCase() + t.slice(1)}`).classList.add('hidden');
                });

                document.getElementById(`tab${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`).classList.add('active');
                document.getElementById(`panel${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`).classList.remove('hidden');

                if (tabId === 'movimenti') {
                    document.getElementById('movementsTitle').innerText = 
                        currentUser?.username === 'admin' ? 'tutti i movimenti' : 'i tuoi movimenti';
                    renderTransactions();
                }
                if (tabId === 'admin' && currentUser?.username === 'admin') {
                    renderUsersList();
                }
            }

            // Popola filtro utenti per admin
            function populateUserFilter() {
                if (!currentUser || currentUser.username !== 'admin') return;
                
                const filter = document.getElementById('userFilter');
                let options = '<option value="all">tutti gli utenti</option>';
                
                usersCache.forEach(user => {
                    options += `<option value="${user.id}">${user.username} (${user.wallet})</option>`;
                });
                
                filter.innerHTML = options;
            }

            // Render transazioni (con filtri per admin)
            function renderTransactions() {
                if (!currentUser) return;
                
                const isAdmin = currentUser.username === 'admin';
                const adminFilters = document.getElementById('adminFilters');
                const listEl = document.getElementById('transactionsList');
                const countEl = document.getElementById('transactionsCount');
                
                // Mostra/nasconde filtri admin
                if (isAdmin) {
                    adminFilters.classList.remove('hidden');
                } else {
                    adminFilters.classList.add('hidden');
                }
                
                // Filtra transazioni
                let filtered = [...transactionsStorage];
                
                if (isAdmin) {
                    const userId = document.getElementById('userFilter')?.value;
                    const type = document.getElementById('typeFilter')?.value;
                    
                    if (userId && userId !== 'all') {
                        filtered = filtered.filter(t => t.userId === userId);
                    }
                    if (type && type !== 'all') {
                        filtered = filtered.filter(t => t.type === type);
                    }
                } else {
                    filtered = filtered.filter(t => t.userId === currentUser.id);
                }
                
                // Ordina per data (più recenti prima)
                filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                countEl.innerText = filtered.length;

                if (filtered.length === 0) {
                    listEl.innerHTML = '<div class="empty-state">nessun movimento</div>';
                    return;
                }

                let html = '';
                filtered.forEach(t => {
                    const date = new Date(t.timestamp);
                    const timeStr = date.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                    const dateStr = date.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
                    
                    let icon = '📤';
                    let typeText = 'Invio';
                    let amountClass = 'amount-negative';
                    let sign = '-';
                    
                    if (t.type === 'ricevi') {
                        icon = '📥';
                        typeText = 'Ricevuta';
                        amountClass = 'amount-positive';
                        sign = '+';
                    } else if (t.type === 'ricarica') {
                        icon = '💰';
                        typeText = 'Ricarica';
                        amountClass = 'amount-positive';
                        sign = '+';
                    }
                    
                    html += `
                        <div class="transaction-item">
                            <div class="transaction-header">
                                <div class="transaction-type">
                                    <div class="type-icon">${icon}</div>
                                    <div>
                                        <div class="type-text">${typeText}</div>
                                        ${isAdmin ? `<span class="user-badge">${t.userName}</span>` : ''}
                                    </div>
                                </div>
                                <div class="transaction-amount ${amountClass}">
                                    ${sign}${t.amount} VELO
                                </div>
                            </div>
                            <div class="transaction-details">
                                <span>${t.otherWallet ? `wallet: ${t.otherWallet}` : ''}</span>
                                <span class="transaction-time">${dateStr} · ${timeStr}</span>
                            </div>
                        </div>
                    `;
                });
                listEl.innerHTML = html;
            }

            // Render lista utenti per admin
            function renderUsersList() {
                if (!currentUser || currentUser.username !== 'admin') return;

                document.getElementById('totalUsers').innerText = usersCache.length;
                const totalVelo = usersCache.reduce((sum, u) => sum + (u.velo || 0), 0);
                document.getElementById('totalVelo').innerText = totalVelo;
                document.getElementById('totalTransactions').innerText = transactionsStorage.length;

                const container = document.getElementById('usersListContainer');
                
                if (usersCache.length === 0) {
                    container.innerHTML = '<div class="empty-state">nessun utente</div>';
                    return;
                }

                let html = '';
                usersCache.forEach(user => {
                    const userTransactions = transactionsStorage.filter(t => t.userId === user.id).length;
                    
                    html += `
                        <div class="transaction-item" style="padding:0.8rem;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <div style="font-weight:600;">
                                        ${user.username}
                                        ${user.username === 'admin' ? '<span class="badge-admin">admin</span>' : ''}
                                    </div>
                                    <div style="font-size:0.8rem; color:#6b7280;">
                                        <span class="user-wallet">${user.wallet || '------'}</span>
                                        <span style="margin-left:1rem;">${userTransactions} tx</span>
                                    </div>
                                </div>
                                <div style="display:flex; align-items:center; gap:1rem;">
                                    <span style="font-weight:600; color:#2563eb;">${user.velo || 0} VELO</span>
                                    ${user.username !== 'admin' ? 
                                        `<button class="delete-user-btn" onclick="deleteUser('${user.id}', '${user.username}')" style="padding:0.4rem 1rem; font-size:0.8rem;">elimina</button>` : 
                                        ''}
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            // Funzione globale per eliminare utenti
            window.deleteUser = async function(userId, username) {
                if (!currentUser || currentUser.username !== 'admin') {
                    alert('Solo admin può eliminare utenti');
                    return;
                }

                if (!confirm(`Sei sicuro di voler eliminare l'utente "${username}"?`)) return;

                const deleted = await apiDelete(userId);
                
                if (deleted) {
                    usersCache = usersCache.filter(u => u.id !== userId);
                    
                    addTransaction('eliminato', 0, 'SYSTEM', `Utente ${username} eliminato`, currentUser.id);
                    
                    transactionsStorage = transactionsStorage.filter(t => t.userId !== userId);
                    
                    saveTransactions();
                    
                    renderUsersList();
                    populateUserFilter();
                    
                    if (!document.getElementById('panelMovimenti').classList.contains('hidden')) {
                        renderTransactions();
                    }
                    
                    const msg = document.getElementById('sendMessage');
                    msg.innerText = `✅ Utente ${username} eliminato`;
                    msg.className = 'message success';
                    setTimeout(() => msg.innerText = '', 3000);
                }
            };

            // Auto update
            function startAutoUpdate() {
                if (autoUpdateInterval) clearInterval(autoUpdateInterval);
                autoUpdateInterval = setInterval(async () => {
                    if (!currentUser) return;
                    
                    let freshUsers = await apiGet();
                    if (Array.isArray(freshUsers)) {
                        usersCache = freshUsers;
                        let freshUser = usersCache.find(u => u.id === currentUser.id);
                        if (freshUser) {
                            currentUser = freshUser;
                            updateDashboardUI();
                            
                            if (!document.getElementById('panelMovimenti').classList.contains('hidden')) {
                                renderTransactions();
                            }
                            if (currentUser.username === 'admin') {
                                if (!document.getElementById('panelAdmin').classList.contains('hidden')) {
                                    renderUsersList();
                                }
                                populateUserFilter();
                            }
                        } else {
                            logout();
                        }
                    }
                }, 2000);
            }

            function stopAutoUpdate() {
                if (autoUpdateInterval) {
                    clearInterval(autoUpdateInterval);
                    autoUpdateInterval = null;
                }
            }

            function logout() {
                stopAutoUpdate();
                currentUser = null;
                deleteCookie();
                showAuth();
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
            }

            // Init
            async function init() {
                await ensureAdminAccount();
                loadTransactions();
                
                let cookieUsername = getCookie();
                if (cookieUsername) {
                    let found = usersCache.find(u => u.username === cookieUsername);
                    if (found) {
                        currentUser = found;
                        showDashboard();
                        return;
                    }
                }
                showAuth();
            }

            // Event Listeners
            document.getElementById('loginBtn').addEventListener('click', async () => {
                let username = document.getElementById('loginUsername').value.trim();
                let password = document.getElementById('loginPassword').value.trim();

                usersCache = await apiGet();
                let user = usersCache.find(u => u.username === username && u.password === password);

                if (!user) {
                    document.getElementById('authMessage').innerText = 'Credenziali errate';
                    document.getElementById('authMessage').classList.remove('hidden');
                    setTimeout(() => document.getElementById('authMessage').classList.add('hidden'), 3000);
                    return;
                }

                currentUser = user;
                setCookie(username);
                showDashboard();
            });

            document.getElementById('signupBtn').addEventListener('click', async () => {
                let username = document.getElementById('loginUsername').value.trim();
                let password = document.getElementById('loginPassword').value.trim();

                if (!username || !password) {
                    document.getElementById('authMessage').innerText = 'Inserisci username e password';
                    document.getElementById('authMessage').classList.remove('hidden');
                    setTimeout(() => document.getElementById('authMessage').classList.add('hidden'), 3000);
                    return;
                }

                if (username === 'admin') {
                    document.getElementById('authMessage').innerText = 'Username non disponibile';
                    document.getElementById('authMessage').classList.remove('hidden');
                    setTimeout(() => document.getElementById('authMessage').classList.add('hidden'), 3000);
                    return;
                }

                usersCache = await apiGet();
                if (usersCache.some(u => u.username === username)) {
                    document.getElementById('authMessage').innerText = 'Username già esistente';
                    document.getElementById('authMessage').classList.remove('hidden');
                    setTimeout(() => document.getElementById('authMessage').classList.add('hidden'), 3000);
                    return;
                }

                let newWallet = generateUniqueWallet(usersCache);
                let newUser = {
                    username: username,
                    password: password,
                    wallet: newWallet,
                    velo: 1
                };

                let created = await apiPost(newUser);
                if (created) {
                    usersCache.push(created);
                    currentUser = created;
                    setCookie(username);
                    
                    addTransaction('ricarica', 1, 'SYSTEM', 'bonus benvenuto', created.id);
                    
                    showDashboard();
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', logout);

            // Tabs
            document.getElementById('tabInvia').addEventListener('click', () => activateTab('invia'));
            document.getElementById('tabRicevi').addEventListener('click', () => activateTab('ricevi'));
            document.getElementById('tabMovimenti').addEventListener('click', () => activateTab('movimenti'));
            document.getElementById('tabAdmin').addEventListener('click', () => activateTab('admin'));

            // Filtri admin
            document.getElementById('userFilter')?.addEventListener('change', renderTransactions);
            document.getElementById('typeFilter')?.addEventListener('change', renderTransactions);

            // INVIO VELO
            document.getElementById('sendVeloBtn').addEventListener('click', async () => {
                if (!currentUser) return;

                let destWallet = document.getElementById('destWallet').value.trim();
                let amount = parseInt(document.getElementById('sendAmount').value, 10);
                let sendMsg = document.getElementById('sendMessage');

                if (!/^\d{6}$/.test(destWallet)) {
                    sendMsg.innerText = 'wallet non valido';
                    sendMsg.className = 'message error';
                    return;
                }

                if (isNaN(amount) || amount <= 0) {
                    sendMsg.innerText = 'importo non valido';
                    sendMsg.className = 'message error';
                    return;
                }

                usersCache = await apiGet();
                let sender = usersCache.find(u => u.id === currentUser.id);
                let receiver = usersCache.find(u => u.wallet === destWallet);

                if (!receiver) {
                    sendMsg.innerText = 'wallet destinatario inesistente';
                    sendMsg.className = 'message error';
                    return;
                }

                if (sender.velo < amount) {
                    sendMsg.innerText = `saldo insufficiente (${sender.velo} VELO)`;
                    sendMsg.className = 'message error';
                    return;
                }

                let updatedSender = await apiPut(sender.id, { ...sender, velo: sender.velo - amount });
                let updatedReceiver = await apiPut(receiver.id, { ...receiver, velo: receiver.velo + amount });

                if (updatedSender && updatedReceiver) {
                    currentUser = updatedSender;
                    usersCache = usersCache.map(u => {
                        if (u.id === sender.id) return updatedSender;
                        if (u.id === receiver.id) return updatedReceiver;
                        return u;
                    });

                    addTransaction('invia', amount, destWallet, `inviato a ${destWallet}`, sender.id);
                    addTransaction('ricevi', amount, sender.wallet, `ricevuto da ${sender.wallet}`, receiver.id);

                    updateDashboardUI();
                    sendMsg.innerText = `✅ inviati ${amount} VELO a ${destWallet}`;
                    sendMsg.className = 'message success';
                    document.getElementById('destWallet').value = '';
                    
                    if (!document.getElementById('panelMovimenti').classList.contains('hidden')) {
                        renderTransactions();
                    }
                } else {
                    sendMsg.innerText = 'transazione fallita';
                    sendMsg.className = 'message error';
                }
            });

            init();
        })();
    </script>
</body>
</html>
