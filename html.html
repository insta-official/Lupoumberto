<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Visualizzatore HTML</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: #f9f9f9;
        }
        .container {
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 12px;
            margin-bottom: 10px;
            resize: vertical;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-visualizza {
            background: #007BFF;
            color: white;
        }
        .btn-visualizza:hover {
            background: #0056b3;
        }
        .btn-elimina {
            background: #dc3545;
            color: white;
        }
        .btn-elimina:hover {
            background: #a71d2a;
        }
        .btn-incolla {
            background: #28a745;
            color: white;
        }
        .btn-incolla:hover {
            background: #1e7e34;
        }
        .btn-salva {
            background: #ffc107;
            color: black;
        }
        .btn-salva:hover {
            background: #d39e00;
        }
        iframe {
            margin-top: 20px;
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            border-radius: 12px;
            background: white;
        }
        .note {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visualizzatore HTML</h1>
        <div class="toolbar">
            <button class="btn-visualizza" onclick="visualizza()">Visualizza</button>
            <button class="btn-elimina" onclick="elimina()">Elimina</button>
            <button class="btn-incolla" onclick="incolla()">Incolla</button>
            <button class="btn-salva" onclick="salva()">Salva</button>
        </div>
        <textarea id="htmlInput" placeholder="Inserisci il tuo codice HTML qui..."></textarea>
        <iframe id="preview" title="Anteprima HTML"></iframe>
        <div class="note">Nota: Non esegui codice non sicuro.</div>
    </div>

    <script>
        function visualizza() {
            const html = document.getElementById("htmlInput").value;
            const preview = document.getElementById("preview");
            preview.contentDocument.open();
            preview.contentDocument.write(html);
            preview.contentDocument.close();
        }

        function elimina() {
            document.getElementById("htmlInput").value = "";
        }

        async function incolla() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById("htmlInput").value = text;
            } catch (err) {
                alert("Impossibile incollare. Consentire l'accesso alla clipboard.");
            }
        }

        function salva() {
            const html = document.getElementById("htmlInput").value;
            const filename = prompt("Inserisci un nome per il file (es. esempio.html):", "esempio.html");
            if (filename && html.trim() !== "") {
                const blob = new Blob([html], { type: "text/html" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = filename.endsWith(".html") ? filename : filename + ".html";
                a.click();
                URL.revokeObjectURL(url);
            }
        }
    </script>
</body>
</html>
